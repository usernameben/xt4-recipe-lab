<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="КМЗ Lab">
<meta name="description" content="Fujifilm X-T4 film simulation recipes for vintage glass">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>КМЗ Recipe Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Space+Mono:wght@400;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0a08; --surface:#160e0b; --surface2:#1e1410;
    --border:#2e1f18; --red:#c0241a; --red2:#e8321f;
    --cream:#e8dcc8; --cream2:#c8b89a; --muted:#6b5a50;
    --green:#4a7c59;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{
    background:var(--bg); color:var(--cream);
    font-family:'Space Mono',monospace;
    min-height:100%; min-height:-webkit-fill-available;
    overscroll-behavior:none;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px),
      radial-gradient(ellipse at 15% 40%,rgba(192,36,26,0.04) 0%,transparent 55%);
  }

  /* HEADER */
  header{
    border-bottom:3px solid var(--red);
    padding:calc(0.85rem + var(--safe-top)) 1.25rem 0.85rem;
    display:flex; align-items:center; gap:1rem;
    background:var(--bg); position:sticky; top:0; z-index:100;
    box-shadow:0 2px 24px rgba(192,36,26,0.18);
  }
  .logo-block{display:flex;align-items:center;gap:0.85rem;}
  .star-icon{color:var(--red);font-size:1.7rem;line-height:1;filter:drop-shadow(0 0 7px rgba(192,36,26,0.55));flex-shrink:0;}
  .logo-text{display:flex;flex-direction:column;gap:2px;}
  .logo-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:0.2em;color:var(--cream);text-transform:uppercase;line-height:1;}
  .logo-sub{font-family:'Special Elite',serif;font-size:0.55rem;color:var(--red);letter-spacing:0.12em;}
  .badge{margin-left:auto;background:transparent;border:1px solid var(--border);padding:0.22rem 0.55rem;font-size:0.5rem;color:var(--muted);letter-spacing:0.14em;white-space:nowrap;}
  .badge.online{color:var(--green);border-color:var(--green);}

  /* CONSTRUCTIVIST STRIPE */
  .stripe{height:4px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 18px,var(--bg) 18px,var(--bg) 22px);opacity:0.55;}

  /* LAYOUT */
  main{max-width:1080px;margin:0 auto;padding:1.25rem 1rem calc(2.5rem + var(--safe-bottom));display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;}
  @media(max-width:680px){main{grid-template-columns:1fr;}.right-col{position:static!important;}}
  .left-col{display:flex;flex-direction:column;gap:1rem;}
  .right-col{position:sticky;top:72px;}

  /* PANELS */
  .panel{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--red);padding:1.1rem 1.1rem 1.2rem;}
  .panel-label{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:0.22em;color:var(--red);text-transform:uppercase;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.6rem;}
  .panel-label .num{font-family:'Special Elite',serif;font-size:1.05rem;color:var(--muted);line-height:1;}
  .panel-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* DROP ZONE */
  .drop-zone{border:1px dashed var(--border);padding:1.5rem 1rem;text-align:center;cursor:pointer;background:var(--bg);transition:all 0.2s;}
  .drop-zone:hover,.drop-zone.over{border-color:var(--red);background:rgba(192,36,26,0.04);}
  .drop-icon{font-size:1.5rem;opacity:0.18;display:block;margin-bottom:0.4rem;}
  .drop-zone p{font-size:0.7rem;color:var(--muted);line-height:1.7;}
  .drop-zone strong{color:var(--cream2);font-weight:400;}
  #fileInput{display:none;}
  .preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.35rem;margin-top:0.7rem;}
  .preview-grid img{width:100%;aspect-ratio:1;object-fit:cover;border:1px solid var(--border);filter:sepia(0.12);}

  /* LENS GRID */
  .lens-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;}
  .lens-section-label{grid-column:1/-1;font-family:'Oswald',sans-serif;font-size:0.58rem;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;padding:0.45rem 0 0.25rem;border-top:1px solid var(--border);margin-top:0.25rem;display:flex;align-items:center;gap:0.5rem;}
  .lens-section-label:first-child{border-top:none;margin-top:0;padding-top:0;}
  .lens-section-label .dot{width:5px;height:5px;background:var(--red);flex-shrink:0;}
  .lens-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:0.55rem 0.65rem;cursor:pointer;text-align:left;font-size:0.68rem;line-height:1.45;transition:all 0.15s;font-family:'Space Mono',monospace;position:relative;}
  .lens-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background 0.15s;}
  .lens-btn strong{display:block;font-family:'Oswald',sans-serif;font-weight:600;font-size:0.78rem;color:var(--cream2);margin-bottom:1px;letter-spacing:0.04em;}
  .lens-btn .origin{font-size:0.55rem;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;display:block;margin-top:1px;}
  .lens-btn.active{border-color:var(--red);background:rgba(192,36,26,0.07);color:var(--cream2);}
  .lens-btn.active::before{background:var(--red);}
  .lens-btn.active strong{color:var(--cream);}

  /* STYLE GRID */
  .style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;}
  .style-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:0.52rem 0.25rem;cursor:pointer;font-family:'Oswald',sans-serif;font-size:0.66rem;letter-spacing:0.07em;text-align:center;transition:all 0.15s;text-transform:uppercase;}
  .style-btn.active{border-color:var(--cream2);color:var(--cream);background:rgba(200,184,154,0.07);}

  /* GENERATE */
  .gen-btn{width:100%;background:var(--red);color:var(--cream);border:none;padding:1rem;font-family:'Oswald',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:0.22em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;position:relative;overflow:hidden;}
  .gen-btn::after{content:'★';position:absolute;right:1.1rem;top:50%;transform:translateY(-50%);font-size:1rem;opacity:0.35;}
  .gen-btn:active{background:var(--red2);transform:scale(0.98);}
  .gen-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;}
  .gen-btn:disabled::after{display:none;}

  /* INSTALL BANNER */
  #install-banner{display:none;background:rgba(192,36,26,0.07);border:1px solid rgba(192,36,26,0.22);padding:0.65rem 1rem;align-items:center;gap:0.75rem;font-size:0.7rem;color:var(--cream2);}
  #install-banner.show{display:flex;}
  #install-btn{background:var(--red);color:var(--cream);border:none;padding:0.3rem 0.7rem;font-family:'Oswald',sans-serif;font-size:0.68rem;letter-spacing:0.1em;cursor:pointer;}
  #install-dismiss{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;}

  /* PLACEHOLDER */
  .placeholder{border:1px solid var(--border);padding:3.5rem 1.5rem;text-align:center;color:var(--border);font-family:'Special Elite',serif;font-size:0.95rem;letter-spacing:0.1em;line-height:2.6;background:var(--surface);position:relative;}
  .placeholder::before{content:'★';display:block;font-size:2rem;color:var(--border);margin-bottom:0.5rem;}

  /* RECIPE CARD */
  .recipe-card{background:var(--surface);border:1px solid var(--border);display:none;}
  .recipe-card.show{display:block;animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .recipe-top-bar{height:5px;background:var(--red);}
  .recipe-header{padding:1.2rem 1.2rem 1rem;border-bottom:1px solid var(--border);background:linear-gradient(160deg,rgba(192,36,26,0.06) 0%,transparent 55%);position:relative;}
  .recipe-header::after{content:'★';position:absolute;top:1rem;right:1.2rem;font-size:1.5rem;color:var(--border);}
  .recipe-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.9rem;color:var(--cream);letter-spacing:0.07em;line-height:1;text-transform:uppercase;}
  .recipe-subtitle{font-family:'Special Elite',serif;font-size:0.77rem;color:var(--cream2);margin-top:0.38rem;line-height:1.5;font-style:italic;}
  .film-sim-pill{display:inline-flex;align-items:center;margin-top:0.7rem;background:var(--red);padding:0.22rem 0.6rem;font-family:'Oswald',sans-serif;font-size:0.66rem;color:var(--cream);letter-spacing:0.12em;text-transform:uppercase;}
  .lens-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.55rem;}
  .lens-tag{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.5rem;padding:0.16rem 0.45rem;letter-spacing:0.06em;}

  /* SETTINGS */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.32rem;padding:1.1rem 1.2rem;}
  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:0.42rem 0.58rem;background:var(--bg);border:1px solid var(--border);border-left:2px solid var(--border);}
  .setting-label{font-family:'Space Mono',monospace;font-size:0.5rem;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;}
  .setting-val{font-family:'Oswald',sans-serif;font-size:0.88rem;font-weight:600;letter-spacing:0.04em;}
  .val-pos{color:#5a9a6a;}
  .val-neg{color:var(--red2);}
  .val-neutral{color:var(--cream2);}

  /* NOTES */
  .recipe-notes{border-top:1px solid var(--border);padding:0.95rem 1.2rem;font-family:'Special Elite',serif;font-size:0.79rem;color:var(--muted);line-height:1.8;}
  .notes-head{font-family:'Oswald',sans-serif;font-size:0.6rem;letter-spacing:0.17em;color:var(--red);font-style:normal;display:block;margin-bottom:0.4rem;text-transform:uppercase;}
  .tip{color:#4a3a30;font-size:0.72rem;font-style:normal;margin-top:0.22rem;font-family:'Space Mono',monospace;}

  /* COPY */
  .copy-btn{display:block;width:calc(100% - 2.4rem);margin:0 1.2rem 1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.52rem;font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:0.16em;cursor:pointer;text-transform:uppercase;transition:all 0.15s;}
  .copy-btn:hover{border-color:var(--red);color:var(--cream2);}
  .copy-btn:active{transform:scale(0.97);}

  /* TOAST */
  #offline-toast{position:fixed;bottom:calc(1.5rem + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--red);color:var(--cream2);font-family:'Space Mono',monospace;font-size:0.58rem;padding:0.5rem 1.1rem;letter-spacing:0.1em;transition:transform 0.3s;z-index:200;white-space:nowrap;}
  #offline-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo-block">
    <div class="star-icon">★</div>
    <div class="logo-text">
      <div class="logo-title">Recipe Lab</div>
      <div class="logo-sub">КМЗ · ЦЕЙС · ГЕЛИОС · FUJIFILM X-T4</div>
    </div>
  </div>
  <div class="badge" id="online-badge">OFFLINE</div>
</header>

<div class="stripe"></div>

<div id="install-banner">
  <span>★ Добавить на главный экран</span>
  <button id="install-btn">INSTALL</button>
  <button id="install-dismiss">✕</button>
</div>

<main>
  <div class="left-col">

    <div class="panel">
      <div class="panel-label"><span class="num">I</span> Sample Photos</div>
      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">⊞</span>
        <p><strong>Tap to load reference shots</strong><br>Up to 6 images for style reference</p>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="panel">
      <div class="panel-label"><span class="num">II</span> Optical Instrument</div>
      <div class="lens-grid" id="lensGrid"></div>
    </div>

    <div class="panel">
      <div class="panel-label"><span class="num">III</span> Shooting Directive</div>
      <div class="style-grid" id="styleGrid"></div>
    </div>

    <button class="gen-btn" id="genBtn">Выработать Рецепт</button>

  </div>

  <div class="right-col">
    <div class="placeholder" id="placeholder">
      ВЫБРАТЬ ОБЪЕКТИВ<br>
      ВЫБРАТЬ СТИЛЬ<br>
      ★<br>
      GENERATE RECIPE
    </div>

    <div class="recipe-card" id="recipeCard">
      <div class="recipe-top-bar"></div>
      <div class="recipe-header">
        <div class="recipe-name" id="rName"></div>
        <div class="recipe-subtitle" id="rSubtitle"></div>
        <div class="film-sim-pill" id="rFilmSim"></div>
        <div class="lens-tags" id="rLensTags"></div>
      </div>
      <div class="settings-grid" id="rSettings"></div>
      <div class="recipe-notes">
        <span class="notes-head">★ Lens Directive</span>
        <span id="rNotes"></span>
        <div id="rTips"></div>
      </div>
      <button class="copy-btn" id="copyBtn">⊕ Copy to Clipboard</button>
    </div>
  </div>
</main>
</div>

<div id="offline-toast">★ Works offline</div>

<script>
const LENS_DATA = {
  helios44:    {name:"Helios-44",      mm:"58mm f/2",   origin:"USSR · KMZ",              traits:"warm cast, compressed contrast, swirly bokeh, soft wide open sharp centre, APS-C = 87mm"},
  helios40:    {name:"Helios-40-2",    mm:"85mm f/1.5", origin:"USSR · KMZ",              traits:"very low contrast, yellowish+magenta cast, heavy swirl, extreme glow, APS-C = 128mm"},
  flektogon24: {name:"MC Flektogon",  mm:"35mm f/2.4", origin:"DDR · Carl Zeiss Jena",   traits:"multicoated, moderate contrast, neutral-cool colour, sharp across frame, APS-C = 53mm"},
  flektogon28: {name:"Flektogon",     mm:"35mm f/2.8", origin:"DDR · Carl Zeiss Jena",   traits:"single-coated, lower contrast, more flare character, warmer rendering, APS-C = 53mm"},
  tth:         {name:"TTH Projection",mm:"3\" f/1.8",  origin:"England · Taylor & Hobson",traits:"uncoated projection lens, extreme low contrast, painterly glow, wild vignette, never designed for cameras"},
  ttartisan10: {name:"TTArtisan",     mm:"10mm f/2",   origin:"China · DJ-Optical",       traits:"ultra-wide, barrel distortion, modern coatings, decent contrast, cool-neutral, APS-C = 15mm"},
  artisans35:  {name:"7Artisans",     mm:"35mm f/1.4", origin:"China · 7Artisans",        traits:"modern manual, slight warm cast, smooth bokeh, APS-C = 53mm"},
};

const LENS_SECTIONS = [
  {label:"Soviet Glass",       keys:["helios44","helios40"]},
  {label:"East German Zeiss",  keys:["flektogon24","flektogon28"]},
  {label:"British Projection", keys:["tth"]},
  {label:"Modern Manual",      keys:["ttartisan10","artisans35"]},
];

const STYLE_DATA = {
  street:"gritty urban documentary",portrait:"flattering skin tones",landscape:"rich naturalistic colour",
  film:"cinematic grade",moody:"dark atmospheric",vintage:"faded retro warm grain",
  golden:"golden hour warmth",overcast:"flat diffuse contemplative",tungsten:"indoor tungsten night",
  bw_street:"punchy B&W documentary",bw_portrait:"soft tonal B&W",cinematic:"widescreen teal & orange"
};
const STYLE_LABELS = {
  street:"Street",portrait:"Portrait",landscape:"Landscape",film:"Filmic",moody:"Moody",vintage:"Vintage",
  golden:"Golden Hr",overcast:"Overcast",tungsten:"Tungsten",bw_street:"B&W Street",bw_portrait:"B&W Portrait",cinematic:"Cinematic"
};

let selectedLenses=["helios44"], selectedStyle="street";

function buildRecipe(lenses,style){
  const has=k=>lenses.includes(k);
  const p={...(({
    street:   {name:"Dirty Chrome",    sub:"Classic Chrome street grit — Kodachrome documentary spirit",       film:"Classic Chrome",       hl:-1,sh:1, co:-1,nr:-4,sp:0, cl:2, gr:"Strong Small",cc:"Strong",chrB:"Weak",  wb:"Daylight",    wbR:2,wbB:-2,dr:"DR200"},
    portrait: {name:"Portra Soul",     sub:"Warm Portra skin tones — soft, intimate, timeless",                film:"PRO Neg.Hi",            hl:-2,sh:0, co:1, nr:-2,sp:-2,cl:-1,gr:"Weak Large",  cc:"Off",   chrB:"Off",   wb:"Shade",       wbR:3,wbB:-3,dr:"DR200"},
    landscape:{name:"Steppe Velvia",   sub:"Saturated naturalistic — rich greens and deep blues",              film:"Velvia/Vivid",          hl:-2,sh:1, co:2, nr:-3,sp:0, cl:1, gr:"Weak Small",  cc:"Weak",  chrB:"Strong",wb:"Daylight",    wbR:1,wbB:0, dr:"DR400"},
    film:     {name:"Soviet ETERNA",   sub:"Cinematic flat grade — lifted shadows, rolled highlights",          film:"ETERNA",               hl:-2,sh:2, co:-1,nr:-3,sp:-2,cl:0, gr:"Weak Large",  cc:"Weak",  chrB:"Off",   wb:"Kelvin 5200K",wbR:2,wbB:-1,dr:"DR200"},
    moody:    {name:"Leningrad Bypass",sub:"Bleach bypass darkness — crushed blacks, heavy atmosphere",         film:"ETERNA BLEACH BYPASS", hl:-1,sh:3, co:-2,nr:-4,sp:-1,cl:1, gr:"Strong Large",cc:"Strong",chrB:"Weak",  wb:"Cloudy",      wbR:1,wbB:-2,dr:"DR200"},
    vintage:  {name:"Kodachrome East", sub:"Faded slide film warmth — cross-processed glow, organic grain",    film:"Classic Neg",           hl:1, sh:2, co:1, nr:-3,sp:-2,cl:-1,gr:"Strong Small",cc:"Weak",  chrB:"Off",   wb:"Cloudy",      wbR:4,wbB:-3,dr:"DR200"},
    golden:   {name:"Golden Час",      sub:"Magic hour gold — warm light, honeyed glow, long shadows",         film:"Classic Chrome",        hl:-1,sh:2, co:1, nr:-3,sp:-1,cl:1, gr:"Weak Large",  cc:"Strong",chrB:"Off",   wb:"Shade",       wbR:5,wbB:-4,dr:"DR200"},
    overcast: {name:"Grey Noise",      sub:"Overcast muted — flat light, quiet contemplative colour",          film:"Classic Neg",           hl:-1,sh:1, co:-2,nr:-3,sp:-1,cl:0, gr:"Weak Large",  cc:"Weak",  chrB:"Weak",  wb:"Cloudy",      wbR:2,wbB:-1,dr:"DR200"},
    tungsten: {name:"CineStill Ночь",  sub:"Tungsten indoor warmth — inspired by CineStill 800T",              film:"ETERNA",               hl:-2,sh:3, co:0, nr:-2,sp:-2,cl:-1,gr:"Strong Large", cc:"Off",   chrB:"Off",   wb:"Kelvin 3200K",wbR:3,wbB:-5,dr:"DR200"},
    bw_street:{name:"Tri-X Grit",      sub:"Kodak Tri-X 400 spirit — high contrast, punchy, heavy grain",      film:"ACROS+R",              hl:-1,sh:2, co:0, nr:-4,sp:1, cl:2, gr:"Strong Small",cc:"Off",   chrB:"Off",   wb:"Auto",        wbR:0,wbB:0, dr:"DR200"},
    bw_portrait:{name:"Ilford Velvet", sub:"Soft portrait B&W — inspired by Ilford FP4 delicate tonal range",  film:"ACROS",                hl:-2,sh:0, co:0, nr:-2,sp:-2,cl:-2,gr:"Weak Large",  cc:"Off",   chrB:"Off",   wb:"Auto",        wbR:0,wbB:0, dr:"DR200"},
    cinematic:{name:"Teal & Grain",    sub:"Widescreen cinema grade — teal shadows, warm highlights",           film:"ETERNA BLEACH BYPASS", hl:-1,sh:3, co:-1,nr:-3,sp:-2,cl:1, gr:"Weak Large",  cc:"Strong",chrB:"Strong",wb:"Kelvin 5600K",wbR:2,wbB:2, dr:"DR400"},
  })[style]||{name:"Dirty Chrome",sub:"Classic Chrome street grit",film:"Classic Chrome",hl:-1,sh:1,co:-1,nr:-4,sp:0,cl:2,gr:"Strong Small",cc:"Strong",chrB:"Weak",wb:"Daylight",wbR:2,wbB:-2,dr:"DR200"})};

  // Lens adjustments
  if(has("helios40")){p.hl=Math.max(p.hl-1,-2);p.sh=Math.min(p.sh+1,4);p.sp=Math.max(p.sp-1,-4);p.cl=Math.max(p.cl-1,-5);p.co=Math.max(p.co-1,-4);p.wbR=Math.min(p.wbR+2,9);p.wbB=Math.max(p.wbB-1,-9);if(p.film==="Velvia/Vivid")p.film="PRO Neg.Hi";}
  else if(has("helios44")){p.wbR=Math.min(p.wbR+1,9);p.sp=Math.max(p.sp-1,-4);p.sh=Math.min(p.sh+1,4);}
  if(has("flektogon24")){p.wbB=Math.min(p.wbB+1,9);p.cl=Math.min(p.cl+1,5);p.sp=Math.min(p.sp+1,4);}
  if(has("flektogon28")){p.wbR=Math.min(p.wbR+1,9);p.sh=Math.min(p.sh+1,4);p.sp=Math.max(p.sp-1,-4);}
  if(has("tth")){p.hl=Math.max(p.hl-2,-2);p.sh=Math.min(p.sh+2,4);p.sp=Math.max(p.sp-2,-4);p.cl=Math.max(p.cl-3,-5);p.co=Math.max(p.co-2,-4);p.nr=Math.max(p.nr-2,-4);p.wbR=Math.min(p.wbR+3,9);p.gr="Weak Large";if(p.film==="Velvia/Vivid")p.film="Classic Neg";if(p.film==="ACROS+R")p.film="ACROS";}
  if(has("ttartisan10")){p.cl=Math.min(p.cl+1,5);p.sp=Math.min(p.sp+1,4);p.co=Math.min(p.co+1,4);}
  if(has("artisans35")){p.wbR=Math.min(p.wbR+1,9);p.sp=Math.max(p.sp-1,-4);}

  const notes={
    helios44:`The Helios-44 on APS-C becomes 87mm equivalent — the crop uses only the sharpest centre. Warm WB shift compensates for the amber cast. For the swirl, position subject 1–2m away with a distant background full of specular highlights. Stop to f/5.6–f/8 for crisp results that still carry Soviet character.`,
    helios40:`The Helios-40-2 at f/1.5 has very low contrast, a yellowish-magenta cast, and spherical aberration glow. On APS-C it's ~128mm — a tight portrait lens only. This recipe corrects the cast while preserving the glow. Thrives in soft diffused light; avoid harsh cross-light as it flares severely. Stop to f/2.8 for a dramatic contrast improvement.`,
    flektogon24:`The MC Flektogon 35mm f/2.4 is the most technically well-behaved lens in the collection — multicoated, sharp across the frame, neutral colour. On APS-C it's 53mm equivalent. The recipe pulls back warmth and raises clarity to exploit the lens's inherent resolution. A great workhorse for street and environmental portraits.`,
    flektogon28:`The single-coated Flektogon 35mm f/2.8 has more character than the MC version — warmer, more prone to flare in backlit situations, with a classic East German rendering. This recipe works with those traits: a warmth boost and reduced sharpening to let the lens breathe beautifully.`,
    tth:`The Taylor Taylor & Hobson Projection 3" f/1.8 was never designed for cameras. The rendering is unlike anything from a photo lens: extreme glow, heavy vignette, no coatings, wild flare. This recipe tries to impose structure but results will always be unpredictable. Embrace it. Shoot wide open only. Treat it as a creative instrument rather than a technical tool.`,
    ttartisan10:`The TTArtisan 10mm f/2.0 is ultra-wide at 15mm equivalent on APS-C — practically fisheye territory. Modern multicoated, it renders with decent contrast and a neutral-cool colour signature. The recipe pushes clarity and colour for the wide perspective. Use the barrel distortion deliberately for impact.`,
    artisans35:`The 7Artisans 35mm f/1.4 is a modern manual lens with a slight warm cast and smooth bokeh at wide apertures. At 53mm equivalent it's a natural street and portrait focal length. The recipe compensates for the warm cast and reduces sharpening slightly to give a more vintage feel that complements the manual focus experience.`,
  };

  const tips={
    street:["ETTR — expose slightly right, Soviet lenses lose shadow detail fast","Zone focus at f/5.6 — pre-set 3m on the ring for reactive street work","Shoot into the light for Soviet-era flare; use it rather than fight it"],
    portrait:["Use X-T4 Digital Microprism for precise manual focus on the near eye","Position subject 1–2m away, bright background 5m+ for Helios swirl","Open shade or overcast is ideal — vintage glass loves soft, even light"],
    landscape:["Stop to f/8 for maximum corner-to-corner sharpness on all lenses","DR400 protects highlights in high-contrast landscape lighting","A lens hood is essential — uncoated vintage glass flares catastrophically"],
    film:["Shoot at -1/3 EV for denser, more filmic shadows","ETERNA was designed for cinema — pairs well with the X-T4's flat ETERNA for video","Overcast light on vintage glass + ETERNA = genuinely cinematic SOOC"],
    moody:["Meter for highlights, let shadows crush — the recipe is built for this","Shoot at blue hour for maximum atmospheric darkness","Helios 40-2 wide open in dim soft light is this recipe's peak pairing"],
    vintage:["Overexpose +1/3 EV — expired film stocks had generous highlight latitude","ISO 3200 with Strong grain gives an authentic pushed-film look","Direct sunlight gives the warmest, most cross-processed slide effect"],
    golden:["Shoot within 20 minutes of sunset — WB shift exaggerates golden light","Keep sun to the side for gorgeous Soviet glass flare","Helios-44 wide open at golden hour against bokeh is this recipe's peak"],
    overcast:["Overcast is genuinely the best light for vintage glass — reveals all character","Drop to base ISO 160 for cleanest shadow detail in flat light","+1/3 to +2/3 EV opens up flat grey scenes"],
    tungsten:["Start at ISO 3200 — the recipe is calibrated for available tungsten light","Wide open — the Helios lenses shine in low light with creamy backgrounds","Avoid mixing tungsten and daylight — WB is fixed for interior warmth"],
    bw_street:["ACROS+R darkens blue sky and brightens warm skin — ideal for street portraits","Harsh urban light is this recipe's best environment","ISO 3200 gives authentic grain matching the Tri-X 400 spirit"],
    bw_portrait:["ACROS without filter gives the most neutral tonal response for portraits","Window light or open shade with vintage glass in B&W is magical","Focus precisely on the near eye — wide open bokeh in monochrome is extraordinary"],
    cinematic:["Set aspect ratio to 16:9 on the X-T4 for instant widescreen crop","Color Chrome FX Blue + Strong pushes teal into shadows for the Hollywood grade","Warm backgrounds against subject maximise the teal-orange effect"],
  };

  return {
    name:p.name, subtitle:p.sub, filmSimulation:p.film,
    settings:{"Dynamic Range":p.dr,"Highlight":fmt(p.hl),"Shadow":fmt(p.sh),"Color":fmt(p.co),"Noise Reduc.":fmt(p.nr),"Sharpening":fmt(p.sp),"Clarity":fmt(p.cl),"Grain Effect":p.gr,"Color Chrome":p.cc,"CC Blue":p.chrB,"White Balance":p.wb,"WB Shift R":fmt(p.wbR),"WB Shift B":fmt(p.wbB)},
    lensNotes:notes[lenses[0]]||`Recipe tuned for ${lenses.map(l=>LENS_DATA[l].name).join(" & ")}.`,
    shootingTips:tips[style]||tips.street
  };
}

function fmt(v){return v>0?`+${v}`:`${v}`;}
function valClass(v){const n=parseInt(v);if(isNaN(n)||n===0)return"val-neutral";return n>0?"val-pos":"val-neg";}

function renderLenses(){
  const grid=document.getElementById("lensGrid");
  let html="";
  LENS_SECTIONS.forEach(sec=>{
    html+=`<div class="lens-section-label"><span class="dot"></span>${sec.label}</div>`;
    sec.keys.forEach(key=>{
      const l=LENS_DATA[key],a=selectedLenses.includes(key)?"active":"";
      html+=`<button class="lens-btn ${a}" data-lens="${key}"><strong>${l.name}</strong>${l.mm}<span class="origin">${l.origin}</span></button>`;
    });
  });
  grid.innerHTML=html;
  grid.querySelectorAll(".lens-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const lens=btn.dataset.lens;
      if(selectedLenses.includes(lens)){if(selectedLenses.length>1)selectedLenses=selectedLenses.filter(l=>l!==lens);}
      else{selectedLenses.push(lens);}
      renderLenses();
    });
  });
}

function renderStyles(){
  const grid=document.getElementById("styleGrid");
  grid.innerHTML=Object.keys(STYLE_DATA).map(s=>`<button class="style-btn ${selectedStyle===s?"active":""}" data-style="${s}">${STYLE_LABELS[s]||s}</button>`).join("");
  grid.querySelectorAll(".style-btn").forEach(btn=>{btn.addEventListener("click",()=>{selectedStyle=btn.dataset.style;renderStyles();});});
}

function renderRecipe(recipe){
  document.getElementById("placeholder").style.display="none";
  const card=document.getElementById("recipeCard");
  card.className="recipe-card";void card.offsetWidth;card.className="recipe-card show";
  document.getElementById("rName").textContent=recipe.name;
  document.getElementById("rSubtitle").textContent=recipe.subtitle;
  document.getElementById("rFilmSim").textContent=`★ ${recipe.filmSimulation}`;
  document.getElementById("rLensTags").innerHTML=selectedLenses.map(l=>`<span class="lens-tag">${LENS_DATA[l].name} ${LENS_DATA[l].mm}</span>`).join("");
  document.getElementById("rSettings").innerHTML=Object.entries(recipe.settings).map(([k,v])=>`<div class="setting-row"><span class="setting-label">${k}</span><span class="setting-val ${valClass(v)}">${v}</span></div>`).join("");
  document.getElementById("rNotes").textContent=recipe.lensNotes;
  document.getElementById("rTips").innerHTML=recipe.shootingTips?.length?`<div style="margin-top:0.85rem"><span class="notes-head">★ Field Directives</span>${recipe.shootingTips.map(t=>`<div class="tip">▸ ${t}</div>`).join("")}</div>`:"";
  document.getElementById("copyBtn").onclick=()=>{
    const lines=[`★ ${recipe.name}`,recipe.subtitle,"",`Film Simulation: ${recipe.filmSimulation}`,...Object.entries(recipe.settings).map(([k,v])=>`${k}: ${v}`),"",`Lens: ${selectedLenses.map(l=>`${LENS_DATA[l].name} ${LENS_DATA[l].mm}`).join(", ")}`,"",`Notes: ${recipe.lensNotes}`];
    navigator.clipboard.writeText(lines.join("\n")).then(()=>{const btn=document.getElementById("copyBtn");btn.textContent="★ Copied!";setTimeout(()=>btn.textContent="⊕ Copy to Clipboard",2000);});
  };
}

const dropZone=document.getElementById("dropZone"),fileInput=document.getElementById("fileInput");
dropZone.addEventListener("click",()=>fileInput.click());
dropZone.addEventListener("dragover",e=>{e.preventDefault();dropZone.classList.add("over");});
dropZone.addEventListener("dragleave",()=>dropZone.classList.remove("over"));
dropZone.addEventListener("drop",e=>{e.preventDefault();dropZone.classList.remove("over");handleFiles(e.dataTransfer.files);});
fileInput.addEventListener("change",e=>handleFiles(e.target.files));
function handleFiles(files){const grid=document.getElementById("previewGrid");grid.innerHTML="";Array.from(files).slice(0,6).forEach(file=>{const r=new FileReader();r.onload=e=>{const img=document.createElement("img");img.src=e.target.result;grid.appendChild(img);};r.readAsDataURL(file);});}

document.getElementById("genBtn").addEventListener("click",()=>{
  const btn=document.getElementById("genBtn");btn.disabled=true;btn.textContent="Обработка…";
  setTimeout(()=>{renderRecipe(buildRecipe(selectedLenses,selectedStyle));btn.disabled=false;btn.textContent="Выработать Рецепт";},350);
});

let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("install-banner").classList.add("show");});
document.getElementById("install-btn").addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById("install-banner").classList.remove("show");});
document.getElementById("install-dismiss").addEventListener("click",()=>document.getElementById("install-banner").classList.remove("show"));

const badge=document.getElementById("online-badge"),toast=document.getElementById("offline-toast");
function updateOnline(){if(navigator.onLine){badge.textContent="ONLINE";badge.classList.add("online");}else{badge.textContent="OFFLINE";badge.classList.remove("online");toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),3000);}}
window.addEventListener("online",updateOnline);window.addEventListener("offline",updateOnline);updateOnline();

if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW failed:",e));});}

renderLenses();renderStyles();
</script>
</body>
</html>
